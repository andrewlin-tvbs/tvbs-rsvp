  }

  .container {

  }

  /* 1. 主視覺 */
  .hero-section {
    width: 90%;
    margin: 0 auto 40px;
  }
  .hero-section video, .hero-section img {
    width: 100%;

  }

    color: var(--white);

  }

    font-weight: 900;

  }

  .event-year {

    letter-spacing: 6px;

  }
  .event-name {
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 8px;
  }

  /* 5. 時間地點資訊 */
  .meta-section {
    margin-bottom: 50px;
    font-size: 15px;
    color: var(--dim);
    line-height: 1.8;
    letter-spacing: 1px;
  }
  .meta-section p {
    margin-bottom: 4px;
  }

  /* 6. 內文區塊 */
  .copy-section {
    margin-bottom: 50px;

    font-weight: 900;

    letter-spacing: 4px;
    display: block;
    margin: 4px 0 16px;
  }

  .highlight-section {

  }
  .form-disclaimer {

    letter-spacing: 1px;
    margin-bottom: 24px;
    font-weight: 300;
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid #555;
    padding: 12px 0;
    font-size: 16px;

    text-align: center;
    outline: none;
    transition: border-color 0.3s ease;
    border-radius: 0;
    -webkit-appearance: none;
  }
  .form-group input:focus {
    border-bottom-color: var(--gold);
  }
  .form-group input::placeholder {
    color: #666;
    letter-spacing: 2px;
  }
  .submit-btn {
    width: 100%;
    background-color: var(--gold);
    color: var(--black);
    border: none;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 6px;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.3s ease;
  }
  .submit-btn:hover {
    opacity: 0.8;
  }
  .submit-btn:disabled {
    background-color: #555;
    color: #222;
    cursor: not-allowed;
  }
